[include mainsail.cfg]

[include _ebb36.cfg]

[include Orbiter2_SmartSensor.cfg]

[include _BTT Octopus Pro.cfg]

[include _klicky-probe.cfg]

#[include autoZ.cfg]

[include KAMP_Settings.cfg]

[include /home/biqu/printer_data/config/KAMP/Adaptive_Meshing.cfg]

[exclude_object]

[respond]
# Enable M118 and RESPOND commands

[force_move]
enable_force_move: True

#[mcu CB2]
#serial: /tmp/klipper_host_mcu

[temperature_sensor CB2]
sensor_type: temperature_host

[resonance_tester]
accel_chip: adxl345
probe_points: 100,100,20

[output_pin beeper]
pin: PB0
pwm: true
value: 0
shutdown_value: 0
cycle_time: 0.001

[gcode_macro _BEEPER_VARS]
variable_vol: 0.25
gcode:

[gcode_macro SET_VOLUME]
gcode:
    {% set VOL = params.VOL|default(0.25)|float %}
    SET_GCODE_VARIABLE MACRO=_BEEPER_VARS VARIABLE=vol VALUE={VOL}

[gcode_macro M300]
description: Play a tone. S=frequency Hz, P=duration ms
gcode:
    {% set S = params.S|default(1000)|int %}
    {% set P = params.P|default(100)|int %}
    {% set VOL = printer["gcode_macro _BEEPER_VARS"].vol %}
    {% if S > 0 %}
        SET_PIN PIN=beeper VALUE={VOL} CYCLE_TIME={ 1.0 / S }
        G4 P{P}
    {% endif %}
    SET_PIN PIN=beeper VALUE=0
    G4 P5

[gcode_macro CHIME_START]
gcode:
    M300 S880 P100
    G4 P100
    M300 S880 P100

[gcode_macro CHIME_DONE]
gcode:
    M300 S880 P1000
    G4 P200
    M300 S880 P1000

[gcode_macro CHIME_CANCEL]
gcode:
    M300 S440 P4000

[gcode_macro CHIME_PAUSE]
gcode:
    M300 S880 P100
    G4 P100
    M300 S880 P100
    G4 P1000
    M300 S880 P100
    G4 P100
    M300 S880 P100
    G4 P1000
    M300 S880 P100
    G4 P100
    M300 S880 P100

[neopixel chamber_leds]
pin: PB10
chain_count: 32
color_order: GRB
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 0.0

[gcode_macro LEDS_PRINTING]
gcode:
    SET_LED LED=chamber_leds RED=0 GREEN=1 BLUE=1 SYNC=0 TRANSMIT=1

[gcode_macro LEDS_STANDBY]
gcode:
    SET_LED LED=chamber_leds RED=1 GREEN=0 BLUE=0 SYNC=0 TRANSMIT=1

[gcode_macro LEDS_OFF]
gcode:
    SET_LED LED=chamber_leds RED=0.0 GREEN=0.0 BLUE=0.0 SYNC=0 TRANSMIT=1

[gcode_macro _LED_PULSE_VARS]
variable_pulse_active: 0
variable_pulse_step: 0
variable_pulse_direction: 1
gcode:

[delayed_gcode led_pulse]
initial_duration: 0
gcode:
    {% if printer["gcode_macro _LED_PULSE_VARS"].pulse_active %}
        {% set step = printer["gcode_macro _LED_PULSE_VARS"].pulse_step %}
        {% set dir = printer["gcode_macro _LED_PULSE_VARS"].pulse_direction %}
        {% set total_steps = 20 %}

        # Interpolate between cyan (0,1,1) and orange (1,0.33,0)
        {% set t = step / total_steps %}
        {% set r = (0 + t * 1.0) | round(3) %}
        {% set g = (1 + t * (0.33 - 1)) | round(3) %}
        {% set b = (1 + t * (0 - 1)) | round(3) %}

        SET_LED LED=chamber_leds RED={r} GREEN={g} BLUE={b} SYNC=0 TRANSMIT=1

        {% set next_step = step + dir %}
        {% if next_step >= total_steps %}
            SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_direction VALUE=-1
            {% set next_step = total_steps %}
        {% elif next_step <= 0 %}
            SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_direction VALUE=1
            {% set next_step = 0 %}
        {% endif %}

        SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_step VALUE={next_step}
        UPDATE_DELAYED_GCODE ID=led_pulse DURATION=0.1
    {% endif %}

[gcode_macro LEDS_PAUSE]
gcode:
    CHIME_PAUSE
    SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_active VALUE=1
    SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_step VALUE=0
    SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_direction VALUE=1
    UPDATE_DELAYED_GCODE ID=led_pulse DURATION=0.1

[gcode_macro LEDS_PULSE_STOP]
gcode:
    SET_GCODE_VARIABLE MACRO=_LED_PULSE_VARS VARIABLE=pulse_active VALUE=0
    UPDATE_DELAYED_GCODE ID=led_pulse DURATION=0

[gcode_macro PAUSE]
rename_existing: _PAUSE_BASE
gcode:
    {% set x = params.X|default(10)|float %}
    {% set y = params.Y|default(10)|float %}
    {% set z = params.Z|default(10)|float %}
    {% set e = params.E|default(1.5)|float %}
    {% set max_z = printer.configfile.settings.stepper_z.position_max|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    {% set z_safe = [cur_z + z, max_z]|min %}
    _PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{e} F2100
    {% endif %}
    {% if cur_z < (max_z - z) %}
        G1 Z{z} F900
    {% endif %}
    G90
    G1 X{x} Y{y} F6000
    LEDS_PAUSE

[gcode_macro RESUME]
rename_existing: _RESUME_BASE
gcode:
    LEDS_PULSE_STOP
    LEDS_PRINTING
    _RESUME_BASE {rawparams}

[safe_z_home]
home_xy_position: 165,259
speed:100
z_hop:15

[stepper_z]
#position_endstop: 0

[bed_mesh]
speed: 250
horizontal_move_z: 15
mesh_min: 5,24
mesh_max: 245,244
probe_count: 5,5
zero_reference_position: 125,125

[resonance_tester]
accel_chip: adxl345
probe_points:
    125, 125, 20

[input_shaper]
#shaper_type_x: mzv
#shaper_type_y: mzv
#shaper_freq_x: 0
#shaper_freq_y: 0

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 2

[z_tilt]
z_positions:
    -50, 20
    125, 298
    300, 20
    
points:
    30, 5
    125, 195
    220, 5

speed: 175
horizontal_move_z: 15
retries: 7
retry_tolerance: 0.015

[gcode_macro UNLOAD_FILAMENT]
gcode:
    filament_unload


[gcode_macro M191]
gcode:
    {% set temp = params.S|default(0)|float %}
    SET_CHAMBER_TEMP TEMP={temp} WAIT=1

[gcode_macro M141]
gcode:
    SET_CHAMBER_TEMP TEMP=0

[firmware_retraction]
retract_length: 0.5              # Length of filament to retract (mm)
retract_speed: 40                # Speed of retraction (mm/s)
unretract_extra_length: 0        # Additional length on unretract
unretract_speed: 40              # Speed of unretract (mm/s)

[gcode_macro Z_TILT_NO_PROBE]
description: Z tilt without probe operations
gcode:
    {% set V = printer["gcode_macro _User_Variables"].verbose %}
    {% if V %}
        { action_respond_info("Z Tilt Adjust") }
    {% endif %}
    _CheckProbe action=query
    G90
    _KLICKY_STATUS_LEVELING
    _Z_TILT_ADJUST {% for p in params
          %}{'%s=%s ' % (p, params[p])}{%
         endfor %}

[gcode_macro PRINT_START]
gcode:
  LEDS_PRINTING
  CHIME_START
  {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
  {% endif %}
  {% set initial_tool = params.TOOL|default("0")|int %}
  
  ATTACH_PROBE
  Z_TILT_NO_PROBE
  G28 Z
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE
  DOCK_PROBE
  T{initial_tool} #Load Initial Tool
  SMART_PARK
  
[gcode_macro PRINT_END]
description: End print routine
gcode:
    LEDS_STANDBY
    CHIME_DONE
    # Get printer limits
    {% set max_x = printer.configfile.settings.stepper_x.position_max|float %}
    {% set max_y = printer.configfile.settings.stepper_y.position_max|float %}
    {% set max_z = printer.configfile.settings.stepper_z.position_max|float %}
    
    # Get current position
    {% set cur_x = printer.toolhead.position.x|float %}
    {% set cur_y = printer.toolhead.position.y|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    
    # Calculate safe lift distance (10mm or to max, whichever is less)
    {% set z_safe = [cur_z + 10.0, max_z]|min %}
    
    # Calculate park position (90% of max Y, centered X)
    {% set park_x = max_x / 2.0 %}
    {% set park_y = max_y * 0.9 %}
    
    # Save current state
    SAVE_GCODE_STATE NAME=END_state
    
    M117 Print Complete!
    
    # Turn off bed, extruder, and fan
    #M140 S0                                  ; Turn off bed
    M104 S0                                  ; Turn off extruder
    M106 S0                                  ; Turn off part cooling fan
    G91                                      ; Relative positioning
    G1 E-2 F2700                            ; Retract 2mm of filament
    G1 Z25 F3000                            ; Lift Z by 10mm

    G90                                      ; Absolute positioning
    G1 X{park_x} Y{park_y} F6000            ; Park toolhead at rear center

    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=END_state
    M117 Ready
    {% set print_time = printer.print_stats.total_duration %}
    {% set print_time_min = (print_time / 60)|int %}
    {% set print_time_sec = (print_time % 60)|int %}
    {action_respond_info("Print completed in %dm %ds" % (print_time_min, print_time_sec))}


[gcode_macro TEST_SPEED]
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU

gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x %}
        {% if x_min < 0 %}
            {% set x_min = 0 %}
        {% endif %}
    
        {% set y_min = printer.toolhead.axis_minimum.y %}
        {% if y_min < 0 %}
            {% set y_min = 0 %}
        {% endif %}
    
        {% set x_min = x_min + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = y_min + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 Y X

        
        #G28      
        # QGL if not already QGLd (only if QGL section exists in config)
        #{% if printer.configfile.settings.quad_gantry_level %}
        #    {% if printer.quad_gantry_level.applied == False %}
        #        QUAD_GANTRY_LEVEL
        #        G28 Z
        #    {% endif %}
        #{% endif %} 

        
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 Y X
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} F{speed*70} #Z{bound + 10}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 Y X # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED

