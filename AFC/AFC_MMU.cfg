[include mcu/AFC_Lite.cfg]

[mcu MMU]
#canbus_uuid: <replace with your can UUID>
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_1B000A001751323532363237-if00 #and comment out canbus_uuid above

[AFC_BoxTurtle MMU]
hub: MMU
extruder: extruder
enable_assist: True        # Setting to True enables espooler assist while printing
enable_kick_start: True    # Setting to True enables full speed espoolers for kick_start_time(0.070 ms default) amount
# buffer: <buffer_name> # If not defined below from the install script, uncomment and add buffer name if using a buffer

[temperature_sensor MMU]
sensor_type: temperature_mcu
sensor_mcu: MMU

[AFC_stepper lane1]
unit: MMU:1
step_pin: MMU:M1_STEP
dir_pin: !MMU:M1_DIR
enable_pin: !MMU:M1_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 156.81 
park_dist: 10
led_index: AFC_Indicator:1
afc_motor_rwd: MMU:MOT1_FWD
afc_motor_fwd: MMU:MOT1_RWD
afc_motor_enb: MMU:MOT1_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!MMU:TRG1
load: ^MMU:EXT1

[tmc2209 AFC_stepper lane1]
uart_pin: MMU:M1_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane2]
unit: MMU:2
step_pin: MMU:M2_STEP
dir_pin: !MMU:M2_DIR
enable_pin: !MMU:M2_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 86.03 
park_dist: 10
led_index: AFC_Indicator:2
afc_motor_rwd: MMU:MOT2_FWD
afc_motor_fwd: MMU:MOT2_RWD
afc_motor_enb: MMU:MOT2_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!MMU:TRG2
load: ^MMU:EXT2

[tmc2209 AFC_stepper lane2]
uart_pin: MMU:M2_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane3]
unit: MMU:3
step_pin: MMU:M3_STEP
dir_pin: !MMU:M3_DIR
enable_pin: !MMU:M3_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 90.0
park_dist: 10
led_index: AFC_Indicator:3
afc_motor_rwd: MMU:MOT3_FWD
afc_motor_fwd: MMU:MOT3_RWD
afc_motor_enb: MMU:MOT3_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!MMU:TRG3
load: ^MMU:EXT3

[tmc2209 AFC_stepper lane3]
uart_pin: MMU:M3_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane4]
unit: MMU:4
step_pin: MMU:M4_STEP
dir_pin: !MMU:M4_DIR
enable_pin: !MMU:M4_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 145.0
park_dist: 10
led_index: AFC_Indicator:4
afc_motor_rwd: MMU:MOT4_FWD
afc_motor_fwd: MMU:MOT4_RWD
afc_motor_enb: MMU:MOT4_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!MMU:TRG4
load: ^MMU:EXT4

[tmc2209 AFC_stepper lane4]
uart_pin: MMU:M4_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_hub MMU]
switch_pin: ^MMU:HUB   # Pin for the hub switch
afc_bowden_length: 1660.68  # Length of the Bowden tube from the hub to the toolhead sensor in mm.
move_dis: 75                # Distance to move the filament within the hub in mm.
#hub_clear_move_dis: 65     # Distance after hub switch becomes fast to retract to insure hub is clear
cut: False                  # Hub cutter installed (e.g. Snappy)

#--=================================================================================--#
######### Hub Cut #####################################################################
#--=================================================================================--#
assisted_retract: False     # If True, retracts are assisted to prevent loose windows on the spool
cut_cmd: AFC #CMD to use
cut_dist: 50                # How much filament to cut off (in mm).
cut_clear: 120              # How far the filament should retract back from the hub (in mm).
cut_min_length: 300.0
cut_servo_pass_angle: 10    # Servo angle to align the Bowden tube with the hole for loading the toolhead.
cut_servo_clip_angle: 180   # Servo angle for cutting the filament.
cut_servo_prep_angle: 80    # Servo angle to prepare the filament for cutting (aligning the exit hole).

#[AFC_screen MMU]
#mac_address: None

[AFC_led AFC_Indicator]
pin: MMU:RGB1
chain_count: 4
color_order: GRBW

