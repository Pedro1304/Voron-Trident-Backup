#####################################################################
# Purge bucket + brush + kick macros
# Bucket: X200 Y260  |  Brush: X182 Y260 (15mm wide, X174.5-X189.5)
# Z: no Z move until brush_z is physically verified
#####################################################################

[gcode_macro _PURGE_BRUSH_VARS]
variable_bucket_x:      200    # X center of poop bucket
variable_bucket_y:      260    # Y position of bucket (back of printer)
variable_brush_x:       182    # X center of brush
variable_brush_y:       260    # Y position of brush (back of printer)
variable_brush_z:       -1     # Z height for brushing (-1 = no Z move, set after physical verification)
variable_brush_width:   15     # Total brush width in mm (wipe range = center ± width/2)
variable_brush_passes:  5      # Number of wipe passes
variable_purge_temp:    0      # Purge temp override (0 = use current temp)
variable_purge_length:  30     # mm of filament to purge
variable_purge_speed:   300    # purge extrusion speed mm/min
variable_kick_y_clear:  255    # Y pullback before kick to avoid dragging on bucket edge
variable_kick_move:     18     # mm to move left to kick blob toward brush
variable_clear_y:       230    # Y position to retract to after each macro (away from back wall)
gcode:

[gcode_macro AFC_CLEAN_NOZZLE]
description: Full sequence: purge, kick, brush
gcode:
    AFC_POOP
    AFC_KICK
    AFC_BRUSH