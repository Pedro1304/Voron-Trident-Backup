#####################################################################
# Purge bucket + brush + kick macros
# Bucket: X56.5 Y0  |  Brush: X75.5 Y0 (15mm wide)
# Z: no Z move — nozzle travels at current Z to brush/bucket
# Set variable_brush_z once physically verified
#####################################################################

[gcode_macro _PURGE_BRUSH_VARS]
variable_bucket_x:      56.5   # X center of poop bucket
variable_bucket_y:      0      # Y position of bucket (front of printer)
variable_brush_x:       75.5   # X center of brush
variable_brush_y:       0      # Y position of brush
variable_brush_z:       -1     # Z height for brushing (-1 = no Z move, set after physical verification)
variable_brush_width:   15     # Total brush width in mm (wipe range = center ± width/2)
variable_brush_passes:  3      # Number of wipe passes
variable_purge_temp:    0      # Purge temp override (0 = use current temp)
variable_purge_length:  30     # mm of filament to purge
variable_purge_speed:   300    # purge extrusion speed mm/min
variable_kick_y_clear:  5      # Y pullback before kick to avoid dragging on bucket edge
variable_kick_move:     19     # mm to move right to kick blob toward brush
gcode:

[gcode_macro AFC_POOP]
description: Purge nozzle into bucket
gcode:
    {% set v = printer['gcode_macro _PURGE_BRUSH_VARS'] %}
    {% set temp = v.purge_temp if v.purge_temp > 0 else printer.extruder.target %}
    SAVE_GCODE_STATE NAME=purge_state
    G90
    # Move to bucket
    G0 X{v.bucket_x} Y{v.bucket_y} F6000
    # Purge
    M83
    G1 E{v.purge_length} F{v.purge_speed}
    G1 E-2 F3600
    G4 P500
    RESTORE_GCODE_STATE NAME=purge_state

[gcode_macro AFC_KICK]
description: Kick poop blob from bucket toward brush
gcode:
    {% set v = printer['gcode_macro _PURGE_BRUSH_VARS'] %}
    SAVE_GCODE_STATE NAME=kick_state
    G90
    # Pull back from Y0 slightly before kick to avoid dragging blob
    G0 X{v.bucket_x} Y{v.kick_y_clear} F6000
    # Kick right toward brush
    G0 X{v.bucket_x + v.kick_move} Y{v.kick_y_clear} F6000
    # Return to Y0
    G0 Y{v.bucket_y} F6000
    RESTORE_GCODE_STATE NAME=kick_state

[gcode_macro AFC_BRUSH]
description: Wipe nozzle on brush
gcode:
    {% set v = printer['gcode_macro _PURGE_BRUSH_VARS'] %}
    {% set wipe_start = v.brush_x - (v.brush_width / 2) %}
    {% set wipe_end   = v.brush_x + (v.brush_width / 2) %}
    SAVE_GCODE_STATE NAME=brush_state
    G90
    # Move to brush start position
    {% if v.brush_z >= 0 %}
        G0 X{wipe_start} Y{v.brush_y} Z{v.brush_z} F6000
    {% else %}
        G0 X{wipe_start} Y{v.brush_y} F6000
    {% endif %}
    # Wipe passes
    {% for i in range(v.brush_passes) %}
        G0 X{wipe_end} F3000
        G0 X{wipe_start} F3000
    {% endfor %}
    RESTORE_GCODE_STATE NAME=brush_state

[gcode_macro AFC_CLEAN_NOZZLE]
description: Full sequence: purge, kick, brush
gcode:
    AFC_POOP
    AFC_KICK
    AFC_BRUSH
