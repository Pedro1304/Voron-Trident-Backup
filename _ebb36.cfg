[mcu EBBCan]
canbus_uuid: b8138acd0e11
canbus_interface: can0

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: EBBCan

[adxl345]
cs_pin: EBBCan: PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.4
filament_diameter: 1.750
max_extrude_only_distance: 400
max_extrude_only_velocity: 120
max_extrude_cross_section: 50
pressure_advance: 0.015                #to be calibrated
pressure_advance_smooth_time: 0.03     #to be calibrated
heater_pin: EBBCan: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
control: pid
pid_Kp: 18.229
pid_Ki: 1.620
pid_Kd: 51.272
min_temp: 0
max_temp: 290
min_extrude_temp: 180

#sensor_type:MAX31865
#sensor_pin: EBBCan: PA4
#spi_bus: spi1
#rtd_nominal_r: 100
#rtd_reference_r: 430
#rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: EBBCan: PA15
interpolate: true
run_current: 0.85
hold_current: 0.100
sense_resistor: 0.11
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

#[fan_generic Part_Cooling]
#pin: EBBCan: PA1

[fan_generic Part_Cooling]
pin: !PC5
max_power: 0.9        # Mellow caps at 0.9
cycle_time: 0.005     # 500 Hz, their reference
hardware_pwm: false
off_below: 0.2        # turbine won't catch below ~15-20%
kick_start_time: 0.3
shutdown_speed: 0

[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50.0
max_power: 1.0
shutdown_speed: 0

#[neopixel hotend_rgb]
#pin: EBBCan:PD3

[probe]
pin: ^EBBCan:PB9
x_offset: 0
y_offset: 23
#z_offset: 0
speed: 25
lift_speed: 50
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance : 0.015
samples_tolerance_retries: 5
