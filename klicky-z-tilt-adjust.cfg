###################
## Z Tilt Adjust
[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
description: Original Z tilt with probe ops (for manual use)
gcode:
    ATTACH_PROBE
    Z_TILT_NO_PROBE {% for p in params
          %}{'%s=%s ' % (p, params[p])}{%
         endfor %}
    G28 Z0
    DOCK_PROBE